# This is a basic workflow to help you get started with Actions

name: Permissions Demo

on:
  push:

  workflow_dispatch:

permissions: {}

jobs:
  solo-lectura:
    runs-on: ubuntu-latest

    permissions: 
      contents: read

    steps:
      - uses: actions/checkout@4

      - name: Verificar que el checkout funciono con solo read
        run: ls -lah

